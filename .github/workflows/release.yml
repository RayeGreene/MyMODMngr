name: Release Build

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            src-tauri/src/rust-ue-tools

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm install

      # Step 1: Build Rust UE Tools with PyO3 bindings
      - name: Build Rust UE Tools
        working-directory: src-tauri/src/rust-ue-tools
        run: |
          echo "Building Rust UE Tools with PyO3 features..."
          cargo build --release --features pyo3 --lib
        shell: bash

      # Step 1.5: Copy Rust DLL to Python path for PyInstaller
      - name: Copy PyO3 DLL to Python
        run: |
          echo "Copying rust_ue_tools.dll to Python site-packages..."
          $pythonSitePackages = python -c "import site; print(site.getsitepackages()[0])"
          
          if (-not (Test-Path $pythonSitePackages)) {
            Write-Error "Python site-packages not found: $pythonSitePackages"
            exit 1
          }
          
          $rustDll = "src-tauri\src\rust-ue-tools\target\release\rust_ue_tools.dll"
          
          if (-not (Test-Path $rustDll)) {
            Write-Error "Rust DLL not found: $rustDll"
            exit 1
          }
          
          Copy-Item -Path $rustDll -Destination $pythonSitePackages -Force
          
          echo "Rust DLL copied successfully to: $pythonSitePackages"
          echo "DLL size: $((Get-Item $rustDll).Length / 1MB) MB"
        shell: pwsh

      # Step 2: Build Python Backend with PyInstaller
      - name: Build Python Backend
        run: |
          echo "Cleaning previous builds..."
          if (Test-Path dist) { Remove-Item -Recurse -Force dist }
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          
          echo "Building backend executable with rust_ue_tools..."
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --onefile `
            --exclude-module PyQt5 `
            --exclude-module PyQt6 `
            --collect-data core.db.migrations `
            --add-binary "src-tauri/src/rust-ue-tools/target/release/rust_ue_tools.dll;." `
            --hidden-import rust_ue_tools `
            --name rivalnxt_backend `
            src-python/run_server.py
          
          if (-not (Test-Path dist\rivalnxt_backend.exe)) {
            Write-Error "Backend executable not found!"
            exit 1
          }
          
          $backendSize = (Get-Item dist\rivalnxt_backend.exe).Length / 1MB
          echo "Backend size: $backendSize MB"
          
          if ($backendSize -lt 50) {
            Write-Warning "Backend size is suspiciously small ($backendSize MB), expected ~115 MB"
          }
        shell: pwsh

      # Step 3: Copy Backend to Tauri Sidecars
      - name: Copy Backend to Sidecars
        run: |
          if (-not (Test-Path src-tauri\sidecars)) {
            New-Item -ItemType Directory -Path src-tauri\sidecars
          }
          Copy-Item -Path dist\rivalnxt_backend.exe `
                    -Destination src-tauri\sidecars\rivalnxt_backend-x86_64-pc-windows-msvc.exe `
                    -Force
          
          if (-not (Test-Path src-tauri\sidecars\rivalnxt_backend-x86_64-pc-windows-msvc.exe)) {
            Write-Error "Failed to copy backend executable!"
            exit 1
          }
          
          $sidecarSize = (Get-Item src-tauri\sidecars\rivalnxt_backend-x86_64-pc-windows-msvc.exe).Length / 1MB
          echo "Sidecar size: $sidecarSize MB"
        shell: pwsh

      # Step 4: Build Tauri Application
      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'RivalNxt ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download this version.'
          releaseDraft: false
          prerelease: false
          args: --verbose

      # Diagnostics - Upload backend for inspection
      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rivalnxt-backend
          path: dist/rivalnxt_backend.exe
          retention-days: 7

      - name: Upload Build Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build/
            src-tauri/target/release/build.log
          retention-days: 3
