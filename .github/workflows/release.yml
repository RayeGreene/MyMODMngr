name: Release Build

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            src-tauri/src/rust-ue-tools
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller maturin
          pip install -r requirements.txt
      - name: Install Node dependencies
        run: npm install

      # Step 1: Build and Install PyO3 Module with Maturin
      - name: Build PyO3 Module with Maturin
        run: |
          echo "Building PyO3 module with Maturin..."
          cd src-tauri/src/rust-ue-tools
          echo "Current directory: $(Get-Location)"
          echo "Contents of current directory:"
          Get-ChildItem -Force
          
          # Check if required files exist
          if (-not (Test-Path "Cargo.toml")) {
            Write-Error "Cargo.toml not found in current directory!"
            Write-Error "Available files:"
            Get-ChildItem -Force
            exit 1
          }
          
          if (-not (Test-Path "pyproject.toml")) {
            Write-Error "pyproject.toml not found in current directory!"
            exit 1
          }
          
          echo "Cargo.toml and pyproject.toml found. Checking workspace members..."
          if (Test-Path "repak-rivals") {
            echo "repak-rivals submodule found"
            Get-ChildItem -Path "repak-rivals" -Force
          } else {
            Write-Error "repak-rivals submodule not found! Git submodules may not have been initialized properly."
            exit 1
          }
          
          # Build using maturin without specifying manifest path (it will use pyproject.toml)
          maturin build --release --features pyo3
          
          echo "Finding built wheel..."
          $wheel = Get-ChildItem -Path target/wheels -Filter *.whl | Select-Object -First 1
          
          if (-not $wheel) {
            Write-Error "No wheel file found in target/wheels!"
            Write-Error "Available contents in target directory:"
            if (Test-Path target) { ls target }
            exit 1
          }
          
          # Store absolute path before changing directories
          $wheelPath = $wheel.FullName
          echo "Found wheel: $wheelPath"
          echo "Installing wheel..."
          pip install $wheelPath --force-reinstall
          
          echo "Verifying installation..."
          python -c "import rust_ue_tools; print('rust_ue_tools imported successfully!')"
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to import rust_ue_tools module!"
            exit 1
          }
          
          echo "Extracting wheel for PyInstaller bundling..."
          cd ../../../
          if (Test-Path extracted_wheel) { Remove-Item -Recurse -Force extracted_wheel }
          New-Item -ItemType Directory -Path extracted_wheel | Out-Null
          
          # Extract wheel to get package data
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [System.IO.Compression.ZipFile]::ExtractToDirectory($wheelPath, "extracted_wheel")
          
          # Manually copy Oodle DLL to the extracted package
          # This is required because Maturin doesn't bundle it by default without pyproject.toml config
          echo "Copying Oodle DLL..."
          $dllPath = "src-tauri/src/rust-ue-tools/repak-rivals/oo2core_9_win64.dll"
          if (-not (Test-Path $dllPath)) {
            Write-Error "Oodle DLL not found at: $dllPath"
            Write-Error "Searching for DLL files in repak-rivals directory:"
            Get-ChildItem -Path "src-tauri/src/rust-ue-tools/repak-rivals" -Filter "*.dll"
            exit 1
          }
          Copy-Item -Path $dllPath -Destination "extracted_wheel/rust_ue_tools/"
          
          echo "Wheel extracted successfully to extracted_wheel/"
          ls extracted_wheel
          ls extracted_wheel/rust_ue_tools
        shell: pwsh

      # Step 2: Build Python Backend with PyInstaller
      - name: Build Python Backend
        run: |
          echo "Cleaning previous builds..."
          if (Test-Path dist) { Remove-Item -Recurse -Force dist }
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          
          echo "Building backend executable using spec file..."
          python -m PyInstaller --noconfirm --clean rivalnxt_backend_merged.spec
          
          if (-not (Test-Path dist\rivalnxt_backend.exe)) {
            Write-Error "Backend executable not found!"
            exit 1
          }
          
          $backendSize = (Get-Item dist\rivalnxt_backend.exe).Length / 1MB
          echo "Backend size: $backendSize MB"
          
          # Adjusted threshold: The local build (114MB) likely includes debug symbols or unstripped binaries.
          # The CI build (19MB + DLL) is optimized. We check for > 15MB to ensure core dependencies are present.
          if ($backendSize -lt 15) {
            Write-Error "Backend size is too small ($backendSize MB). Dependencies might be missing!"
            exit 1
          }
          
          echo "✅ Backend built successfully with correct size!"
        shell: pwsh

      # Step 3: Copy Backend to Tauri Sidecars
      - name: Copy Backend to Sidecars
        run: |
          if (-not (Test-Path src-tauri\sidecars)) {
            New-Item -ItemType Directory -Path src-tauri\sidecars
          }
          Copy-Item -Path dist\rivalnxt_backend.exe `
                    -Destination src-tauri\sidecars\rivalnxt_backend-x86_64-pc-windows-msvc.exe `
                    -Force
          
          if (-not (Test-Path src-tauri\sidecars\rivalnxt_backend-x86_64-pc-windows-msvc.exe)) {
            Write-Error "Failed to copy backend executable!"
            exit 1
          }
          
          $sidecarSize = (Get-Item src-tauri\sidecars\rivalnxt_backend-x86_64-pc-windows-msvc.exe).Length / 1MB
          echo "Sidecar size: $sidecarSize MB"
        shell: pwsh

      # Step 4: Build Tauri Application
      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'RivalNxt ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download this version.'
          releaseDraft: false
          prerelease: false
          args: --verbose

      # Step 5: Compute SHA256 checksum + filename for installer
      - name: Compute SHA256 checksum
        id: sha
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "src-tauri/target" -Recurse -Filter "RivalNxt*_x64-setup.exe" | Select-Object -First 1
          if (-not $installer) { Write-Error "Installer exe not found in src-tauri/target"; exit 1 }

          $installerHash = (Get-FileHash $installer.FullName -Algorithm SHA256).Hash.ToLower()
          $installerName = $installer.Name

          "SETUP_SHA256=$installerHash"       >> $env:GITHUB_OUTPUT
          "INSTALLER_FILENAME=$installerName" >> $env:GITHUB_OUTPUT

      # Step 6: Generate release notes from template
      - name: Generate release notes
        shell: pwsh
        run: |
          (Get-Content release_template.md) `
            -replace '<SETUP_SHA256>', '${{ steps.sha.outputs.SETUP_SHA256 }}' `
            -replace '<INSTALLER_FILENAME>', '${{ steps.sha.outputs.INSTALLER_FILENAME }}' `
          | Set-Content release_generated.md

      # Step 7: Update GitHub Release body with generated notes
      - name: Update GitHub Release body
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        shell: pwsh
        run: |
          gh release edit "$env:TAG_NAME" --notes-file release_generated.md

      # Diagnostics
      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rivalnxt-backend
          path: dist/rivalnxt_backend.exe
          retention-days: 7

      - name: Upload Build Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build/
            src-tauri/target/
          retention-days: 3