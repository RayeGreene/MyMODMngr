name: Release Build

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            src-tauri/src/rust-ue-tools

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller maturin
          pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm install

      # Step 1: Build and Install PyO3 Module with Maturin
      - name: Build PyO3 Module with Maturin
        run: |
          echo "Building PyO3 module with Maturin..."
          cd src-tauri/src/rust-ue-tools
          maturin build --release --features pyo3
          
          echo "Finding built wheel..."
          $wheel = Get-ChildItem -Path target/wheels -Filter *.whl | Select-Object -First 1
          
          if (-not $wheel) {
            Write-Error "No wheel file found in target/wheels!"
            exit 1
          }
          
          echo "Found wheel: $($wheel.FullName)"
          echo "Installing wheel..."
          pip install $wheel.FullName --force-reinstall
          
          echo "Verifying installation..."
          python -c "import rust_ue_tools; print('rust_ue_tools imported successfully!')"
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to import rust_ue_tools module!"
            exit 1
          }
          
          echo "Extracting wheel for PyInstaller bundling..."
          cd ../../../
          if (Test-Path extracted_wheel) { Remove-Item -Recurse -Force extracted_wheel }
          New-Item -ItemType Directory -Path extracted_wheel | Out-Null
          
          # Extract wheel to get package data
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [System.IO.Compression.ZipFile]::ExtractToDirectory($wheel.FullName, "extracted_wheel")
          
          echo "Wheel extracted successfully to extracted_wheel/"
          ls extracted_wheel
        shell: pwsh

      # Step 2: Build Python Backend with PyInstaller
      - name: Build Python Backend
        run: |
          echo "Cleaning previous builds..."
          if (Test-Path dist) { Remove-Item -Recurse -Force dist }
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          
          echo "Building backend executable using spec file..."
          python -m PyInstaller --noconfirm --clean rivalnxt_backend_merged.spec
          
          if (-not (Test-Path dist\rivalnxt_backend.exe)) {
            Write-Error "Backend executable not found!"
            exit 1
          }
          
          $backendSize = (Get-Item dist\rivalnxt_backend.exe).Length / 1MB
          echo "Backend size: $backendSize MB"
          
          if ($backendSize -lt 100) {
            Write-Error "Backend size is too small ($backendSize MB), expected ~114 MB. Dependencies not included!"
            exit 1
          }
          
          echo "✅ Backend built successfully with correct size!"
        shell: pwsh

      # Step 3: Copy Backend to Tauri Sidecars
      - name: Copy Backend to Sidecars
        run: |
          if (-not (Test-Path src-tauri\sidecars)) {
            New-Item -ItemType Directory -Path src-tauri\sidecars
          }
          Copy-Item -Path dist\rivalnxt_backend.exe `
                    -Destination src-tauri\sidecars\rivalnxt_backend-x86_64-pc-windows-msvc.exe `
                    -Force
          
          if (-not (Test-Path src-tauri\sidecars\rivalnxt_backend-x86_64-pc-windows-msvc.exe)) {
            Write-Error "Failed to copy backend executable!"
            exit 1
          }
          
          $sidecarSize = (Get-Item src-tauri\sidecars\rivalnxt_backend-x86_64-pc-windows-msvc.exe).Length / 1MB
          echo "Sidecar size: $sidecarSize MB"
        shell: pwsh

      # Step 4: Build Tauri Application
      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'RivalNxt ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download this version.'
          releaseDraft: false
          prerelease: false
          args: --verbose

      # Diagnostics
      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rivalnxt-backend
          path: dist/rivalnxt_backend.exe
          retention-days: 7

      - name: Upload Build Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build/
            src-tauri/target/release/build.log
          retention-days: 3
